ta-key="h">h</button><button class="kb-btn" data-key="j">j</button><button class="kb-btn" data-key="k">k</button><button class="kb-btn" data-key="l">l</button></div><div class="kb-row"><button class="kb-btn special abc" data-key="SHIFT" id="kb-shift">ABC</button><button class="kb-btn" data-key="z">z</button><button class="kb-btn" data-key="x">x</button><button class="kb-btn" data-key="c">c</button><button class="kb-btn" data-key="v">v</button><button class="kb-btn" data-key="b">b</button><button class="kb-btn" data-key="n">n</button><button class="kb-btn" data-key="m">m</button><button class="kb-btn delete" data-key="BACKSPACE">DEL</button></div><div class="kb-row"><button class="kb-btn narrow" data-key="-">-</button><button class="kb-btn narrow" data-key="&">&</button><button class="kb-btn narrow" data-key=">">&gt;</button><button class="kb-btn narrow" data-key="<">&lt;</button><button class="kb-btn narrow" data-key="/">/</button><button class="kb-btn narrow" data-key=":">:</button><button class="kb-btn narrow" data-key=";">;</button><button class="kb-btn space" data-key=" ">ESPAÇO</button><button class="kb-btn narrow" data-key=".">.</button><button class="kb-btn enter" data-key="ENTER">ENTER</button></div></div><input type="text" id="S" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="send"></div>

function _tl(text,opts,cb){if(!text&&text!==''){if(cb)cb();return;}var _opts=opts||{},initialDelay=_opts.initialDelay||0,charDelay=_opts.charDelay||22,sound=_opts.sound!==false;var div=document.createElement('div');div.className='l';_o.appendChild(div);var span=document.createElement('span');div.appendChild(span);var cur=document.createElement('span');cur.className='tc';div.appendChild(cur);_sb();var i=0,cancelled=false,tid=null;var obj={skip:function(){if(cancelled)return;cancelled=true;if(tid)clearTimeout(tid);span.textContent=text;if(cur)cur.remove();_sb();if(cb)cb();}};_ty.push(obj);function add(){if(cancelled)return;if(i<text.length){span.textContent+=text.charAt(i);if(sound)_ks();_sb();i++;tid=setTimeout(add,charDelay);}else{if(cur)cur.remove();_sb();var idx=_ty.indexOf(obj);if(idx>-1)_ty.splice(idx,1);if(cb)cb();}}

// processa texto com marcadores de pausa [PAUSA:XXXX] onde XXXX é milissegundos
function _tls(text,opts,cb){if(!text&&text!==''){if(cb)cb();return;}var segments=[];var regex=/\[PAUSA:(\d+)\]/g;var lastIdx=0;var match;while((match=regex.exec(text))!==null){if(match.index>lastIdx){segments.push({type:'text',content:text.substring(lastIdx,match.index)});}
segments.push({type:'pause',duration:parseInt(match[1])});lastIdx=match.index+match[0].length;}
if(lastIdx<text.length){segments.push({type:'text',content:text.substring(lastIdx)});}

var _opts=opts||{},charDelay=_opts.charDelay||22,sound=_opts.sound!==false;var div=document.createElement('div');div.className='l';_o.appendChild(div);var span=document.createElement('span');div.appendChild(span);var cur=document.createElement('span');cur.className='tc';div.appendChild(cur);_sb();var cancelled=false;var tid=null;var obj={skip:function(){if(cancelled)return;cancelled=true;if(tid)clearTimeout(tid);var fullText='';segments.forEach(function(s){if(s.type==='text')fullText+=s.content;});span.textContent=fullText;if(cur)cur.remove();_sb();if(cb)cb();}};_ty.push(obj);var segIdx=0;var charIdx=0;function processSeg(){if(cancelled)return;if(segIdx>=segments.length){if(cur)cur.remove();_sb();var idx=_ty.indexOf(obj);if(idx>-1)_ty.splice(idx,1);if(cb)cb();return;}
var seg=segments[segIdx];if(seg.type==='pause'){tid=setTimeout(function(){segIdx++;processSeg();},seg.duration);return;}

processSeg();}

// glossário ofuscado
var _GT={'FLUXO':'FLUXO HUMANO — Definição Técnica\n\nO Fluxo não é uma mera reserva de energia.\nÉ a própria essência da humanidade, gerada pela alma\natravés de emoções, vínculos, escolhas e experiências.\n\nManifesta-se em momentos de alegria, conexões profundas\ne resiliência. É o único recurso capaz de resistir\nàs influências sobrenaturais de forma direta.\n\nLocais com alta carga emocional acumulam Fluxo\nresidual: hospitais, escolas, locais de culto.\nIsso os torna pontos de convergência espiritual.\n\nMedição padrão: unidades FLUX.\nLimiar crítico civil: 20 FLUX.\nLimiar operacional agente: 100 FLUX ou superior.\n\nVer também: EROSAO, PORTADOR-BRUTO','EROSAO':'EROSÃO — Definição Técnica\n\nÉ a medida da corrupção espiritual,\ntrauma e perda de sanidade causada\npelo medo ou pela interação direta com o oculto.\n\nFunciona como uma "mancha cinza" na alma;\nse o seu valor exceder o Fluxo,\no personagem entra no estado "Quebrado",\nsofrendo alucinações e severas penalidades nos seus atributos.\n\nVer também: SIGILO, ZONA MORTA','PORTADOR-BRUTO':'PORTADOR BRUTO — Definição\n\nUma trilha sobre-humana para indivíduos\ncuja biologia já nasceu propensa ao sobrenatural\nou foi "rachada" por traumas. Possuem o dobro\nda reserva de Fluxo comum e potência física esmagadora,\nmas sua densidade energética "envenena" a escrita de sigilos,\nimpedindo o uso de rituais complexos no próprio corpo.\n\nVer também: NUCLEO, PORTADOR-BRUTO','ASSOMBRACAO':'ASSOMBRAÇÃO — Definição\n\nEntidades nascidas do vazamento de\nFluxo humano corrompido pela Erosão.\nElas manifestam-se no plano físico alimentando-se\ndo medo coletivo, preconceitos e mitos urbanos,\nque definem suas regras e capacidades específicas.\n\nVer também: NUCLEO, PORTADOR-BRUTO','SIGILO':'SIGILO — Definição\n\nUma linguagem arcana composta por\nsílabas de poder (atualmente 33 conhecidas)\nque, quando combinadas e ativadas com Fluxo\nou sangue, permitem manipular a realidade.\nEles são divididos em três naturezas:\nPecados (erosivos/destrutivos),\nSentimentos (neutros/emotivos) e\nConexões (estruturais).\n\nVer também: LODO, EMBRYON','NUCLEO':'NÚCLEO — Definição\n\nO "motor" ou coração de uma Zona Morta,\nmanifestando-se como uma distorção espacial esférica\ne quase invisível.\n\nEle condensa a Erosão do ambiente e\narmazena memórias e medos locais,\nutilizando esses dados como base para gerar\nnovas entidades até ser destruído ou dissolvido\npor rituais.\n\nVer também: SUBMERSO, BLUE RAVEN','ZONA-MORTA':'ZONA MORTA — Definição\n\nUm terreno físico que se tornou instável\napós um evento paranormal extremo,\nonde a barreira entre as realidades ficou fina.\nEssas áreas acumulam Erosão continuamente\natravés de um Núcleo, servindo como\n"berçários" para o nascimento de novas\nentidades até que o núcleo seja estabilizado\nou destruído.\n\nVer também: RED RAVEN, BLUE RAVEN','EMBRYON':'EMBRYON — Ficha de Entidade\n\nClassificação: Parasitária / Infiltrador\nAmeaça: Nível 1-2\n\nAPARÊNCIA:\nHumanoides esqueléticos e pálidos.\nMembros alongados. Articulações desproporcionais.\nPele negra e viscosa. Lodo escuro constante.\n\nCOMPORTAMENTO:\nBusca hospedeiro em 40 a 60 minutos após invocação.\nSem hospedeiro, dissolve-se em lodo negro.\nInfiltração humana: imperfeita mas eficaz a distância.\n\nFRAQUEZA PRIMÁRIA:\nLuz intensa reduz mobilidade drasticamente.\nAtear fogo se estiver sangrando gera combustão expontânea.\n\nIDENTIFICAÇÃO EM CAMPO:\nSorrisos fora de sincronia com o contexto.\nAusência de pestanejo.\n"Vale da Estranheza" — instinto humano detecta anomalia.\n\nNOTA DE CAMPO — Agente BR-4471:\n"Se piscar, é humano.\nSe sorrir quando não deveria, saia do ambiente."\n\nVer também: COMPENDIO, MARCADO','SUBMERSO':'SUBMERSO — Definição\n\nHumanos que sobreviveram à imersão\nno lodo do Stalker e tiveram seu sangue\nsubstituído por uma matéria negra consciente.\nEles tornam-se entidades paradoxais com força\nbruta desumana e regeneração acelerada,\nsendo os únicos seres verdadeiramente\nimunes à mente coletiva do Stalker.\n\nVer também: QUEBRADO, AGENCIA KING','ETEROLOGIA':'ETEREOLOGIA — Definição\n\nÉ a ciência arcana que estuda\no sobrenatural como uma extensão da física.\n\nSeu foco principal é catalogar, capturar e domesticar entidades,\ntratando o medo e os fenômenos espirituais como\nenergia psíquica que pode ser convertida em tecnologia útil para a humanidade.\n\nVer também: PROJETO SUTURA, ZONA MORTA','QUEBRADO':'QUEBRADO — Definição\n\nUm estado crítico atingido quando o nível de\nErosão de um indivíduo excede o seu Fluxo.\n\nNesse estado, o personagem sofre penalidades\ndrásticas em seus atributos, enfrenta alucinações\nseveras e corre o risco de perder parcialmente\no controle de suas ações para o narrador.\n\nVer também: VALE DA ESTRANHEZA, LODO','VALE-DA-ESTRANHEZA':'VALE DA ESTRANHEZA — Definição\n\nUm mecanismo de defesa instintivo da\nhumanidade que detecta presenças "não-humanas".\nÉ o que permite aos jogadores notar que um\nEmbryon ou Clone é uma cópia falsa,\nmanifestando-se através de detalhes\nsutis como sorrisos "fora de tempo"\nou o fato de a criatura nunca piscar os olhos.\n\nVer também: COMPENDIO, MARCADO','ORDO TENEBRAE':'ORDO TENEBRAE — Definição\n\nAntiga "Ordem das Sombras",\numa organização internacional que\natuou por décadas como o escudo silencioso do mundo.\n\nSua filosofia baseava-se na "Contenção Responsável",\nmas a ordem foi traída pelo governo e oficialmente\ndissolvida após a catástrofe de 2015.\n\nVer também: AGENCIA KING, SUBMERSO','BLUE RAVEN':'BLUE RAVEN — Definição\n\nAgência de natureza científico-ritualística\ncom sede em Praga.\n\nSob o lema "Compreender é Dominar",\nherda o intelecto da\nOrdo Tenebrae e foca na contenção técnica,\nno estudo sistemático do medo e no\naprisionamento de entidades para fins científicos.\n\nVer também: FLUXO, EROSAO','RED RAVEN':'RED RAVEN — Definição\n\nOrganização europeia de natureza\nmilitar-ocultista com sede em Viena.\n\nSua doutrina prega a Aniquilação Total do paranormal,\nutilizando o lema "A fé não reza, a fé rasga"\ne priorizando o combate bruto, a purificação\npelo fogo e o sacrifício físico de sangue\ncomo combustível.\n\nVer também: EMBRYON, MARCADO','AGENCIA KING':'AGÊNCIA KING — Definição\n\nOrganização autônoma fundada pelos\nKing em Gravenhill após o colapso da Ordo.\n\nAdota uma postura "pós-secreta", acreditando que\na ignorância é um inimigo letal e focando na\n"Sigilotecnia" para investigar, traduzir e\nintegrar o paranormal à realidade humana.\n\nVer também: NUCLEO, ZONA MORTA','COMPENDIO':'COMPÊNDIO — Definição\n\nRegistros doutrinários ou livros impregnados\ncom Fluxo Humano que servem como\nextensões do inventário espiritual do ocultista.\n\nEles garantem acesso a rituais exclusivos,\nequipamentos de elite e bônus passivos\nbaseados na filosofia específica de cada facção.\n\nVer também: ORDO TENEBRAE, SUBMERSO','MARCADO':'MARCADO — Definição\n\nCivis comuns que, influenciados direta\nou indiretamente pelo Stalker, tornam-se\ncanais involuntários de conjuração.\n\nEles são responsáveis pelo surgimento de\nnovas Zonas Mortas sem origem aparente\nao invocarem Embryons contra a própria vontade.\n\nVer também: PROJETO SUTURA, SIGILO','CATASTROFE-2015':'CATASTROFE-2015 — Definição\n\nSequência de ataques terroristas em Gravenhill\nque culminou na invocação da entidade sem nome\ne na liberação de uma praga de clones.\n\nO evento saturou a cidade com Erosão,\ntransformando-a em uma Zona Morta permanente\ne resultando na dissolução traída da Ordo Tenebrae.\n\nVer também: PROJETO SUTURA, SIGILO','LODO':'LODO — Materialização biológica do Fluxo Morto. Sangue do Stalker altamente inflamável, tóxico e portador de microestruturas conscientes.','STALKER':'STALKER — Dimensão orgânica autoconsciente e predatória. Busca mimetizar e consumir a realidade humana para autopreservação cósmica.','ANOTHER HILL':'ANOTHER HILL — O "corpo" físico do Stalker. Um reflexo desbotado e distorcido da nossa realidade com defasagem temporal de três horas.','PROJETO SUTURA':'PROJETO SUTURA — [ACESSO NEGADO — REQUER CREDENCIAIS NÍVEL ÔMEGA].'};

var _f8=function(){if(_ST.level<1)return 'Acesso negado. Requer nível INICIADO.';return 'RESUMO CRONOLÓGICO DE GRAVENHILL\n\nA história moderna de Gravenhill é definida pela\nestratégia da ocultação.\n\nEm 1972, foi fundada a Ordo Tenebrae (Corporação Tenebrae),\nque atuou por décadas como o "escudo silencioso" do mundo,\noperando sob a filosofia da Contenção Responsável.\n\nSob a liderança de figuras como Victor King,\na Ordem mantinha o sobrenatural nos limites do real.\n\nO colapso ocorreu em 2015, durante uma sequência\nde ataques terroristas que culminou na\nCatástrofe de Gravenhill: a invocação de uma entidade\nsem nome (o Stalker) e a liberação de uma praga de clones.\n\nEmbora a Tenebrae tenha contido a ameaça física,\no governo optou pelo silenciamento através da traição,\nacusando a agência pelos ataques e dissolvendo-a oficialmente.\n\nDesde então, Gravenhill é uma Zona Morta permanente,\nonde a barreira entre as realidades é fina e propícia\nao surgimento de entidades.\n\nDo vácuo de poder deixado pela Tenebrae,\nsurgiram as agências atuais: King (2016),\nBlue Raven (2018) e Red Raven (2018).';};

var _f13=function(){if(_ST.level<3)return 'Acesso negado. Requer nível ÔMEGA.';return 'DOSSIÊ BIOGRÁFICO: O FILTRO FINAL\n\nVéspera não nasceu para sua posição;\nela foi "filtrada".\n\nAos 17 anos, ela é o único sucesso real do\nProjeto Grande Filtro, uma iniciativa militar-ocultista\nda Red Raven em Viena que visava criar armas\nvivas a partir de crianças saturadas com Erosão.\n\nSua origem é marcada por um evento de colapso\nem massa: aos 11 anos, durante os testes finais\nde purificação, Véspera manipulou o fluxo dos\noutros candidatos, causando a morte deles e\nabsorvendo suas essências espirituais.\n\nEste ato conferiu a ela uma capacidade de fluxo\nde Agente de Elite e uma autoridade sobre-humana\nque desafia sua aparência jovem.\nEla é a "Carta Preta" de Viena, uma anomalia do\nsangue treinada para ver a humanidade como\numa massa a ser selecionada.';};
